<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>下拉选择页面</title>
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:32px;background:#f7f9fb;color:#17202a}
    main{max-width:760px;margin:auto;background:white;border:1px solid #d8dee6;padding:24px;border-radius:8px}
    label{display:block;margin:12px 0 6px;font-weight:600} select,button{font-size:16px;padding:8px 10px}
    select{width:260px;border:1px solid #aab4c0;border-radius:4px} button{border:0;border-radius:4px;background:#1f6feb;color:white;margin-top:14px}.msg{margin-top:16px;font-weight:700}
  </style>
</head>
<body>
<main>
  <h1>下拉选择页面</h1>
  <label for="city">城市</label>
  <select id="city" data-testid="city-select" aria-label="城市"><option value="">请选择城市</option><option>北京</option><option>上海</option><option>深圳</option></select>
  <label for="role">角色</label>
  <select id="role" data-testid="role-select" aria-label="角色"><option value="">请选择角色</option><option>管理员</option><option>测试人员</option><option>访客</option></select>
  <label for="account-status">账号状态</label>
  <select id="account-status" data-testid="status-select" aria-label="账号状态"><option value="">请选择状态</option><option>启用</option><option>停用</option></select>
  <br><button id="apply-select" data-testid="apply-select" type="button">应用选择</button>
  <p id="select-message" data-testid="select-message" role="status" class="msg"></p>
</main>
<script>
  document.querySelector("#apply-select").addEventListener("click", () => {
    const city = document.querySelector("#city").value || "未选城市";
    const role = document.querySelector("#role").value || "未选角色";
    const status = document.querySelector("#account-status").value || "未选状态";
    document.querySelector("#select-message").textContent = `已选择 ${city} ${role} ${status}`;
  });
</script>
</body>
</html>
