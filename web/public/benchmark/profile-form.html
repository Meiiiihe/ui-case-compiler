<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>资料表单页面</title>
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:32px;background:#f7f9fb;color:#17202a}
    main{max-width:760px;margin:auto;background:white;border:1px solid #d8dee6;padding:24px;border-radius:8px}
    label{display:block;margin:12px 0 6px;font-weight:600} input,textarea,button{font-size:16px;padding:8px 10px}
    input,textarea{width:340px;border:1px solid #aab4c0;border-radius:4px} button{border:0;border-radius:4px;background:#1f6feb;color:white;margin-top:14px}
    .msg{margin-top:16px;font-weight:700}
  </style>
</head>
<body>
<main>
  <h1>资料表单页面</h1>
  <form id="profile-form" data-testid="profile-form">
    <label for="real-name">姓名</label>
    <input id="real-name" name="realName" data-testid="name-input" aria-label="姓名" placeholder="请输入姓名">
    <label for="mobile">手机号</label>
    <input id="mobile" name="mobile" data-testid="mobile-input" aria-label="手机号" placeholder="请输入手机号">
    <label for="email">邮箱</label>
    <input id="email" name="email" data-testid="email-input" aria-label="邮箱" placeholder="请输入邮箱" type="email">
    <label for="address">地址</label>
    <textarea id="address" name="address" data-testid="address-input" aria-label="地址" placeholder="请输入地址"></textarea>
    <br><button id="profile-submit" data-testid="profile-submit" type="submit">提交资料</button>
  </form>
  <p id="profile-message" data-testid="profile-message" role="status" class="msg"></p>
</main>
<script>
  document.querySelector("#profile-form").addEventListener("submit", (event) => {
    event.preventDefault();
    const name = document.querySelector("#real-name").value.trim();
    const mobile = document.querySelector("#mobile").value.trim();
    const email = document.querySelector("#email").value.trim();
    const message = document.querySelector("#profile-message");
    if (!name) message.textContent = "请填写姓名";
    else if (!/^1\d{10}$/.test(mobile)) message.textContent = "手机号格式错误";
    else if (!email.includes("@")) message.textContent = "邮箱格式错误";
    else message.textContent = "资料提交成功";
  });
</script>
</body>
</html>
