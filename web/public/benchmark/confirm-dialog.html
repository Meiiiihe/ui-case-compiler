<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>弹窗确认页面</title>
  <style>
    body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:32px;background:#f7f9fb;color:#17202a}
    main{max-width:760px;margin:auto;background:white;border:1px solid #d8dee6;padding:24px;border-radius:8px}
    button{font-size:16px;padding:8px 10px;border:0;border-radius:4px;background:#1f6feb;color:white;margin-right:8px}
    .danger{background:#c92a2a}.secondary{background:#6b7280}.dialog{display:none;border:1px solid #aab4c0;padding:16px;margin-top:16px;border-radius:6px;background:#fff8e1}
    .msg{margin-top:16px;font-weight:700}
  </style>
</head>
<body>
<main>
  <h1>弹窗确认页面</h1>
  <p>记录：测试订单 A001</p>
  <button id="delete-record" data-testid="delete-record" type="button" class="danger">删除记录</button>
  <button id="archive-record" data-testid="archive-record" type="button" class="secondary">归档记录</button>
  <section id="confirm-dialog" data-testid="confirm-dialog" role="dialog" aria-label="删除确认弹窗" class="dialog">
    <p>确认删除这条记录吗？</p>
    <button id="confirm-delete" data-testid="confirm-delete" type="button" class="danger">确认删除</button>
    <button id="cancel-delete" data-testid="cancel-delete" type="button" class="secondary">取消</button>
  </section>
  <p id="dialog-message" data-testid="dialog-message" role="status" class="msg"></p>
</main>
<script>
  const dialog = document.querySelector("#confirm-dialog");
  const message = document.querySelector("#dialog-message");
  document.querySelector("#delete-record").addEventListener("click", () => { dialog.style.display = "block"; message.textContent = "等待确认"; });
  document.querySelector("#confirm-delete").addEventListener("click", () => { dialog.style.display = "none"; message.textContent = "删除成功"; });
  document.querySelector("#cancel-delete").addEventListener("click", () => { dialog.style.display = "none"; message.textContent = "已取消删除"; });
</script>
</body>
</html>
